name: nebengyuk
description: "NebengYuk - Community Carpool & Micro-Logistics App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5

  # Maps & Location (OpenStreetMap - free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # State Management
  provider: ^6.1.4

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # UI
  google_fonts: ^6.2.1

  # Local Notifications (Android system tray)
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
